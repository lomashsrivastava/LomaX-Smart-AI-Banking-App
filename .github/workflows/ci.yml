name: LomaX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend CI ──────────────────────────────────────────────────────────
  backend:
    name: Backend — TypeScript Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Check health route exists
        run: test -f src/routes/healthRoutes.ts && echo "✓ Health route exists" || exit 1

  # ─── Frontend CI ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Verify PWA manifest
        run: test -f public/manifest.json && echo "✓ manifest.json present" || exit 1

      - name: Verify Service Worker
        run: test -f public/sw.js && echo "✓ sw.js present" || exit 1

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

  # ─── Security Audit ──────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true
