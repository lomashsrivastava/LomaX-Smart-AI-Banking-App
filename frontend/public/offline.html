<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LomaX — No Connection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #020617;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, #22d3ee, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: rgba(14, 116, 144, 0.15);
      border: 2px solid rgba(34, 211, 238, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.3); }
      50% { box-shadow: 0 0 0 16px rgba(34, 211, 238, 0); }
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; }
    p { color: #94a3b8; font-size: 0.95rem; max-width: 400px; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: rgba(14, 116, 144, 0.2);
      border: 1px solid rgba(34, 211, 238, 0.3);
      color: #22d3ee;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #0e7490;
      color: #020617;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0891b2; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="logo">LomaX</div>
  <span class="badge">Offline Mode</span>
  <h1>No Network Connection</h1>
  <p>
    Your device is currently offline. Reconnect to the internet to access live account balances, transactions, and banking features.
  </p>
  <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
